<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background merah solid -->
  <rect width="512" height="512" rx="120" fill="#dc2626"/>
  
  <!-- Mahkota Emas di atas (bersinar) -->
  <g transform="translate(256, 115)">
    <!-- Sinar -->
    <g opacity="0.5" stroke="#fbbf24" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-50" x2="0" y2="-70"/>
      <line x1="-35" y1="-35" x2="-50" y2="-50"/>
      <line x1="35" y1="-35" x2="50" y2="-50"/>
    </g>
    
    <!-- Mahkota -->
    <path d="M-45 25 L-30 -20 L-10 0 L0 -30 L10 0 L30 -20 L45 25 Z" 
          fill="#fbbf24" 
          stroke="#d97706" 
          stroke-width="2"/>
    <!-- Permata mahkota -->
    <circle cx="0" cy="-10" r="6" fill="#dc2626"/>
    <circle cx="-25" cy="-5" r="4" fill="#fff"/>
    <circle cx="25" cy="-5" r="4" fill="#fff"/>
  </g>
  
  <!-- Siluet Siswa Membaca -->
  <g transform="translate(256, 295)">
    <!-- Badan -->
    <path d="M-60 100 C-65 60 -50 30 -30 10 L-25 -15 C-25 -35 -10 -50 0 -50 C10 -50 25 -35 25 -15 L30 10 C50 30 65 60 60 100 Z" 
          fill="white"/>
    
    <!-- Kepala -->
    <ellipse cx="0" cy="-40" rx="30" ry="35" fill="white"/>
    <!-- Kerudung -->
    <path d="M-32 -40 C-32 -70 32 -70 32 -40 C32 -25 35 -15 40 0 L35 5 C25 -5 -25 -5 -35 5 L-40 0 C-35 -15 -32 -25 -32 -40 Z" 
          fill="white"/>
    
    <!-- Al-Qur'an -->
    <g transform="translate(0, 20)">
      <!-- Cover buku -->
      <path d="M-50 0 C-50 -12 -25 -16 0 -14 C25 -16 50 -12 50 0 L50 32 C50 40 25 36 0 38 C-25 36 -50 40 -50 32 Z" 
            fill="#1e3a5f"/>
      <!-- Halaman -->
      <path d="M-47 2 C-47 -8 -25 -12 -2 -10 L-2 34 C-25 32 -47 36 -47 28 Z" fill="#f1f5f9"/>
      <path d="M47 2 C47 -8 25 -12 2 -10 L2 34 C25 32 47 36 47 28 Z" fill="#f1f5f9"/>
      <!-- Garis tulisan -->
      <g stroke="#94a3b8" stroke-width="2">
        <line x1="-37" y1="2" x2="-10" y2="2"/>
        <line x1="-37" y1="8" x2="-7" y2="8"/>
        <line x1="-37" y1="14" x2="-12" y2="14"/>
        <line x1="10" y1="2" x2="37" y2="2"/>
        <line x1="7" y1="8" x2="37" y2="8"/>
        <line x1="12" y1="14" x2="37" y2="14"/>
      </g>
    </g>
    
    <!-- Tangan -->
    <circle cx="-55" cy="25" r="10" fill="white"/>
    <circle cx="55" cy="25" r="10" fill="white"/>
  </g>
  
  <!-- Sparkle kecil -->
  <g fill="#fbbf24">
    <polygon points="380,70 381,73 384,73 382,75 383,78 380,76 377,78 378,75 376,73 379,73" opacity="0.7"/>
    <polygon points="140,85 141,88 144,88 142,90 143,93 140,91 137,93 138,90 136,88 139,88" opacity="0.6"/>
  </g>
  
  <!-- Border putih tipis -->
  <rect x="20" y="20" width="472" height="472" rx="100" 
        fill="none" 
        stroke="white" 
        stroke-width="3" 
        opacity="0.15"/>
</svg>
