<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background dengan warna merah SDIT -->
  <rect width="512" height="512" fill="#dc2626" rx="80"/>
  
  <!-- Icon buku Al-Quran putih di tengah -->
  <g fill="white">
    <!-- Buku terbuka -->
    <path d="M256 120 
             C200 100, 120 120, 120 180 
             L120 380 
             C120 390, 130 400, 140 400 
             L256 380 
             L372 400 
             C382 400, 392 390, 392 380 
             L392 180 
             C392 120, 312 100, 256 120Z"/>
    
    <!-- Halaman kiri -->
    <path fill="#f3f4f6" d="M140 180 
             C140 140, 200 120, 256 130 
             L256 360 
             L140 380 
             Z"/>
    
    <!-- Halaman kanan -->
    <path fill="#f3f4f6" d="M372 180 
             C372 140, 312 120, 256 130 
             L256 360 
             L372 380 
             Z"/>
    
    <!-- Huruf Arab stylized (Alif) -->
    <text x="256" y="300" 
          text-anchor="middle" 
          font-family="Arial, sans-serif" 
          font-size="140" 
          fill="#dc2626"
          font-weight="bold">ا</text>
  </g>
  
  <!-- Badge Quran di bawah -->
  <rect x="156" y="360" width="200" height="40" rx="20" fill="white"/>
  <text x="256" y="388" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="20" 
        fill="#dc2626"
        font-weight="bold">AL-QURAN</text>
</svg>
