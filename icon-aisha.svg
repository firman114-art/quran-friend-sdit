<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient untuk background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    
    <!-- Gradient untuk mahkota -->
    <linearGradient id="crownGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    
    <!-- Glow effect untuk mahkota -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background lingkaran dengan gradient merah -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>
  
  <!-- Rays (sinar) di belakang mahkota -->
  <g transform="translate(256, 110)" opacity="0.6">
    <line x1="0" y1="-40" x2="0" y2="-60" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-28" y1="-28" x2="-42" y2="-42" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="-28" x2="42" y2="-42" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-40" y1="0" x2="-60" y2="0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="0" x2="60" y2="0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Siluet Siswa Membaca Al-Qur'an -->
  <g transform="translate(256, 280)" filter="url(#shadow)">
    <!-- Tubuh/Baju -->
    <path d="M-70 120 
             C-75 80, -60 40, -40 20
             L-35 -10
             C-35 -30, -20 -45, 0 -45
             C20 -45, 35 -30, 35 -10
             L40 20
             C60 40, 75 80, 70 120
             Z" 
          fill="white"/>
    
    <!-- Kepala (hijab/kerudung untuk perempuan, atau kepala untuk laki-laki) -->
    <!-- Menggunakan style netral yang bisa diartikan keduanya -->
    <ellipse cx="0" cy="-35" rx="32" ry="38" fill="white"/>
    
    <!-- Hijab/Kerudung melengkung -->
    <path d="M-35 -35
             C-35 -65, 35 -65, 35 -35
             C35 -20, 40 -10, 45 5
             L40 10
             C30 0, -30 0, -40 10
             L-45 5
             C-40 -10, -35 -20, -35 -35Z" 
          fill="white"/>
    
    <!-- Al-Qur'an (buku terbuka) -->
    <g transform="translate(0, 25)">
      <!-- Buku -->
      <path d="M-55 0
               C-55 -15, -30 -20, 0 -18
               C30 -20, 55 -15, 55 0
               L55 35
               C55 45, 30 40, 0 42
               C-30 40, -55 45, -55 35
               Z" 
            fill="#1e3a5f"/>
      
      <!-- Halaman kiri -->
      <path d="M-52 3
               C-52 -8, -28 -12, -3 -10
               L-3 38
               C-28 36, -52 40, -52 30
               Z" 
            fill="#f8fafc"/>
      
      <!-- Halaman kanan -->
      <path d="M52 3
               C52 -8, 28 -12, 3 -10
               L3 38
               C28 36, 52 40, 52 30
               Z" 
            fill="#f8fafc"/>
      
      <!-- Garis-garis tulisan (stylized) -->
      <line x1="-40" y1="5" x2="-10" y2="5" stroke="#94a3b8" stroke-width="2"/>
      <line x1="-40" y1="12" x2="-8" y2="12" stroke="#94a3b8" stroke-width="2"/>
      <line x1="-40" y1="19" x2="-12" y2="19" stroke="#94a3b8" stroke-width="2"/>
      <line x1="-40" y1="26" x2="-10" y2="26" stroke="#94a3b8" stroke-width="2"/>
      
      <line x1="10" y1="5" x2="40" y2="5" stroke="#94a3b8" stroke-width="2"/>
      <line x1="8" y1="12" x2="40" y2="12" stroke="#94a3b8" stroke-width="2"/>
      <line x1="12" y1="19" x2="40" y2="19" stroke="#94a3b8" stroke-width="2"/>
      <line x1="10" y1="26" x2="40" y2="26" stroke="#94a3b8" stroke-width="2"/>
      
      <!-- Tanda Al-Qur'an kecil di tengah -->
      <circle cx="0" cy="15" r="8" fill="#1e3a5f"/>
      <text x="0" y="20" 
            text-anchor="middle" 
            font-family="Arial, sans-serif" 
            font-size="10" 
            fill="white"
            font-weight="bold">ق</text>
    </g>
    
    <!-- Tangan memegang buku -->
    <ellipse cx="-60" cy="30" rx="12" ry="8" fill="white"/>
    <ellipse cx="60" cy="30" rx="12" ry="8" fill="white"/>
  </g>
  
  <!-- Mahkota/Toga Graduasi di atas kepala -->
  <g transform="translate(256, 130)" filter="url(#glow)">
    <!-- Mahkota emas -->
    <path d="M-40 20
             L-30 -15
             L-10 5
             L0 -25
             L10 5
             L30 -15
             L40 20
             Z" 
          fill="url(#crownGradient)"
          stroke="#b45309"
          stroke-width="2"
          stroke-linejoin="round"/>
    
    <!-- Permata di mahkota -->
    <circle cx="0" cy="-5" r="6" fill="#ef4444"/>
    <circle cx="-25" cy="0" r="4" fill="#3b82f6"/>
    <circle cx="25" cy="0" r="4" fill="#3b82f6"/>
    <circle cx="-15" cy="-20" r="3" fill="#10b981"/>
    <circle cx="15" cy="-20" r="3" fill="#10b981"/>
    
    <!-- Toga/cap graduasi di atas -->
    <rect x="-25" y="-35" width="50" height="8" rx="2" fill="#1e3a5f"/>
    <rect x="-30" y="-38" width="60" height="6" rx="1" fill="#fbbf24"/>
    
    <!-- Gantungan toga -->
    <path d="M25 -30
             Q35 -20, 35 -5
             Q35 5, 30 10" 
          stroke="#fbbf24" 
          stroke-width="3" 
          fill="none"
          stroke-linecap="round"/>
    <circle cx="30" cy="12" r="4" fill="#fbbf24"/>
  </g>
  
  <!-- Efek bintang kecil (achievement sparkle) -->
  <g fill="#fbbf24" opacity="0.8">
    <polygon points="400,80 402,86 408,86 403,90 405,96 400,92 395,96 397,90 392,86 398,86" transform="scale(0.8)"/>
    <polygon points="120,100 122,106 128,106 123,110 125,116 120,112 115,116 117,110 112,106 118,106" transform="scale(0.6)"/>
    <polygon points="420,200 421,203 424,203 422,205 423,208 420,206 417,208 418,205 416,203 419,203" transform="scale(0.5)"/>
  </g>
  
  <!-- Ring putih di pinggir (optional, untuk kontras) -->
  <rect x="16" y="16" width="480" height="480" rx="104" 
        fill="none" 
        stroke="white" 
        stroke-width="4" 
        opacity="0.2"/>
</svg>
